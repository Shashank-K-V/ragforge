[pytest]
# ── Test discovery ────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── asyncio mode ──────────────────────────────────────────────────────────
asyncio_mode = auto

# ── Markers ───────────────────────────────────────────────────────────────
markers =
    integration: Tests that require ChromaDB, real embeddings, or network access.
    slow: Tests that take > 5 seconds.

# ── Output ───────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers

# ── Warnings ──────────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
