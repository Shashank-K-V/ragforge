# ======================================================================= #
#  RAGForge — GitHub Actions CI                                             #
#                                                                           #
#  Triggered on every push and pull request to main/master.                #
#  Jobs:                                                                    #
#    1. lint     — ruff + mypy type-checking                                #
#    2. test     — pytest (unit + integration tests, mocked LLM/embeddings) #
#    3. docker   — build Docker image (verifies Dockerfile is valid)        #
# ======================================================================= #

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch/PR to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ----------------------------------------------------------------------- #
  # Job 1: Lint                                                               #
  # ----------------------------------------------------------------------- #
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: |
          pip install --upgrade pip
          pip install ruff mypy

      - name: Run ruff (linter + formatter check)
        run: |
          ruff check app/ tests/ --output-format=github
          ruff format --check app/ tests/

      - name: Run mypy (type checking)
        run: |
          # Install type stubs and app deps needed for mypy
          pip install -r requirements.txt
          mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # mypy failures are warnings, not blockers

  # ----------------------------------------------------------------------- #
  # Job 2: Test                                                               #
  # ----------------------------------------------------------------------- #
  test:
    name: Run pytest
    runs-on: ubuntu-latest
    needs: lint   # only run tests if lint passes

    # Provide dummy env vars so settings validation doesn't fail
    env:
      HUGGINGFACE_API_KEY: "hf_test_dummy_key_for_ci"
      OPENAI_API_KEY: ""
      LLM_PROVIDER: "huggingface"
      CHROMA_PERSIST_DIR: "/tmp/ragforge_test_chroma"
      UPLOAD_DIR: "/tmp/ragforge_test_uploads"
      LOG_LEVEL: "WARNING"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests (no integration tests)
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            -m "not integration" \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      - name: Coverage summary (GitHub Actions annotation)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false   # don't fail CI if Codecov is unavailable

  # ----------------------------------------------------------------------- #
  # Job 3: Docker build                                                       #
  # ----------------------------------------------------------------------- #
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ragforge:ci-${{ github.sha }}
          # Use GitHub Actions cache to speed up rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Only build the runtime stage
          target: runtime
